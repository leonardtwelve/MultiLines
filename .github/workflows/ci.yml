name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Pas de `version` ici : la version pnpm est lue depuis le champ
        # `packageManager` de `package.json` (source de vérité unique).

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint front
        run: pnpm --filter front lint

      - name: Typecheck front
        run: pnpm --filter front typecheck

      - name: Test front
        run: pnpm --filter front test

      - name: Build front
        run: pnpm --filter front build
      # Le serveur n'est pas encore implémenté (Prompt 2) — ses steps
      # (lint/typecheck/test/build) seront ajoutés dans la PR suivante.
