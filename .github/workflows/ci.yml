name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Pas de `version` ici : la version pnpm est lue depuis le champ
        # `packageManager` de `package.json` (source de vérité unique).

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Lint (root ESLint covers all packages)
        run: pnpm run lint:front

      - name: Typecheck — front
        run: pnpm run typecheck:front

      - name: Test — front
        run: pnpm run test:front

      - name: Build — front
        run: pnpm run build:front

      # Le serveur est un placeholder pour l'instant — pas de lint/test/build
      # significatifs. Sera réactivé dans le Prompt 2.
