name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Pas de `version` ici : la version pnpm est lue depuis le champ
        # `packageManager` de `package.json` (source de vérité unique).

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      # ---- Build shared en premier (front et server en dépendent) ----
      - name: Build — shared
        run: pnpm --filter @pixel-quests/shared build

      - name: Lint — shared
        run: pnpm --filter @pixel-quests/shared lint

      - name: Typecheck — shared
        run: pnpm --filter @pixel-quests/shared typecheck

      - name: Test — shared
        run: pnpm --filter @pixel-quests/shared test

      # ---- Front ----
      - name: Lint — front
        run: pnpm --filter front lint

      - name: Typecheck — front
        run: pnpm --filter front typecheck

      - name: Test — front
        run: pnpm --filter front test

      - name: Build — front
        run: pnpm --filter front build

      # ---- Server ----
      - name: Lint — server
        run: pnpm --filter @pixel-quests/server lint

      - name: Typecheck — server
        run: pnpm --filter @pixel-quests/server typecheck

      - name: Test — server
        run: pnpm --filter @pixel-quests/server test

      - name: Build — server
        run: pnpm --filter @pixel-quests/server build
