<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Quests</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Courier New', monospace;
        background: #0b0d10;
        color: #e6e8eb;
        min-height: 100vh;
      }
      #app {
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
      }
      .home__title {
        font-size: 3rem;
        margin: 0 0 0.5rem;
        color: #ffcc66;
      }
      .home__subtitle {
        opacity: 0.8;
        margin: 0 0 2rem;
      }
      .home__section {
        font-size: 1.25rem;
        margin-top: 2rem;
      }
      .adventures {
        list-style: none;
        padding: 0;
        display: grid;
        gap: 1rem;
      }
      .adventure-card {
        background: #161a1f;
        border: 1px solid #2a2f36;
        border-radius: 8px;
        padding: 1.25rem;
      }
      .adventure-card h3 {
        margin: 0 0 0.5rem;
        color: #ffcc66;
      }
      .adventure-card .meta {
        font-size: 0.85rem;
        opacity: 0.7;
      }
      .adventure-card button {
        background: #ffcc66;
        color: #0b0d10;
        border: 0;
        padding: 0.6rem 1.2rem;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        margin-top: 0.5rem;
      }
      .adventure-card button:hover {
        background: #ffd98a;
      }
      #game {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app/main.ts"></script>
  </body>
</html>
